<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav>
    <div class="logo">🍽 Restaurant Revenue Prediction</div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/predict-page">Predict</a></li>
        <li><a href="/history">History</a></li>
        <li><a href="/about">About</a></li>
    </ul>
</nav>

<div class="container">

    <div class="dashboard-grid">

        <div class="dashboard-card">
            <h3>Total Predictions</h3>
            <h1>{{ total_predictions }}</h1>
        </div>

        <div class="dashboard-card">
            <h3>Average Revenue</h3>
            <h1>₹ {{ average_revenue }}</h1>
        </div>

        <div class="dashboard-card">
            <h3>Highest Revenue</h3>
            <h1>₹ {{ highest_revenue }}</h1>
        </div>

        <div class="dashboard-card">
            <h3>Lowest Revenue</h3>
            <h1>₹ {{ lowest_revenue }}</h1>
        </div>

    </div>

    <canvas id="dashboardChart"></canvas>

</div>

<script>
const ctx=document.getElementById("dashboardChart");

new Chart(ctx,{
type:"bar",
data:{
labels:["Average","Highest","Lowest"],
datasets:[{
label:"Revenue",
data:[
{{ average_revenue }},
{{ highest_revenue }},
{{ lowest_revenue }}
]
}]
}
});
</script>

</body>
</html>
